name: Build Widget

on:
  push:
    branches:
      - main
    paths:
      - 'src/widget/**'
      - 'src/lib/bookingIdempotency.ts'
      - 'src/lib/bookingMutationError.ts'
      - 'src/lib/sessionTimes.ts'
      - 'vite.widget.config.ts'
      - '.github/workflows/build-widget.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure terser available
        run: |
          echo "Ensuring terser is installed (CI hotfix)..."
          npm i terser@5.46.0 --no-save
          node -e "import('terser').then(()=>console.log('terser ESM import: OK')).catch(e=>{console.error('terser ESM import: FAILED', e); process.exit(1)})"

      - name: Debug environment
        run: |
          echo "=== Build Info ==="
          echo "Commit SHA: $GITHUB_SHA"
          echo "Ref: $GITHUB_REF"
          echo ""
          echo "=== Node/npm versions ==="
          echo "Node version: $(node -v)"
          echo "npm version: $(npm -v)"
          echo ""
          echo "=== Vite versions ==="
          echo "Local Vite: $(./node_modules/.bin/vite --version)"
          echo "npx Vite: $(npx vite --version)"
          echo ""
          echo "=== Terser check ==="
          npm ls terser || echo "terser not in npm ls"
          ls -la node_modules/terser 2>/dev/null || echo "node_modules/terser directory not found"
          node -e "import('terser').then(()=>console.log('terser ESM import: OK')).catch(e=>{console.error('terser ESM import: FAILED', e.message)})"
          echo ""
          echo "=== Widget config (minify line) ==="
          grep -n "minify" vite.widget.config.ts || echo "No minify setting found"

      - name: Build widget (no minification)
        run: ./node_modules/.bin/vite build --config vite.widget.config.ts

      - name: Minify with terser CLI
        run: |
          echo "Minifying public/widget.js with terser..."
          ./node_modules/.bin/terser public/widget.js --compress --mangle --output public/widget.js
          echo "Minification complete"
          ls -la public/widget.js

      - name: Commit and push widget files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/widget.js public/widget.css || true
          git diff --staged --quiet || git commit -m "🔧 Auto-build widget bundle"
          git push
